name: deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Install SSH client
        run: sudo apt-get update && sudo apt-get install -y openssh-client

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy adapters on VPS
        run: |
          ssh -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -euo pipefail

            REPOSITORY_URL="https://github.com/AlexZ04/SMC-ADAPTERS.git"
            DEPLOY_DIR="$HOME/smc-adapters"

            if ! command -v git >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y git
            fi

            if [ ! -d "${DEPLOY_DIR}/.git" ]; then
              rm -rf "${DEPLOY_DIR}"
              git clone "${REPOSITORY_URL}" "${DEPLOY_DIR}"
            fi

            cd "${DEPLOY_DIR}"
            git fetch origin master
            git checkout master
            git pull --ff-only origin master
            chmod +x deploy/install-systemd.sh
            ./deploy/install-systemd.sh
          EOF
